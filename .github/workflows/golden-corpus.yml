name: Golden Corpus

on:
  push:
    branches: [main, 'ralph/**']
    paths:
      - 'golden-corpus/**'
      - '.claude/skills/generate/**'
      - '.claude/skills/generate-*/**'
      - '.claude/skills/verify-artifact/**'
      - '.claude/skills/ingest/**'
      - '.claude/skills/ingest-*/**'
      - '.claude/skills/lint/**'
      - '.github/workflows/golden-corpus.yml'
  pull_request:
    paths:
      - 'golden-corpus/**'
      - '.claude/skills/generate/**'
      - '.claude/skills/generate-*/**'
      - '.claude/skills/verify-artifact/**'
  workflow_dispatch:

# Advisory only during initial rollout (see close-the-loop-testing.md non-goals).
# Will flip jobs to hard-fail once per-type fidelity targets hold across three
# consecutive green runs.
jobs:
  generate-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        artifact_type:
          - book
          - pdf
          - slides
          - mindmap
          - infographic
          - quiz
          - flashcards
          - app
          # podcast / video intentionally omitted from the default matrix —
          # both require heavier lazy-installed deps (Piper TTS, Remotion)
          # and are exercised in the weekly nightly job below.

    steps:
      - uses: actions/checkout@v4

      - name: Install base tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc jq
          # ensure shasum is available (it is on ubuntu-latest, but belt+braces)
          command -v shasum >/dev/null || command -v sha256sum >/dev/null

      - name: Install Node (for app + flashcards)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install Python (for genanki)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify source-hash helper
        run: bash .claude/skills/generate/lib/tests/test-source-hash.sh

      - name: Generate ${{ matrix.artifact_type }}
        id: generate
        continue-on-error: true
        run: |
          # Claude Code's /generate is model-driven — CI stubs this by shelling
          # into the handler's rendering helpers directly when they're
          # model-free, or skipping the step when they aren't. Handlers that
          # require the LLM (podcast script writing, quiz authoring, slide
          # outlining) are covered by the nightly matrix instead.
          echo "Generating ${{ matrix.artifact_type }} against golden-corpus..."
          echo "stub=true" >> "$GITHUB_OUTPUT"
          # When handlers ship a non-LLM "--fixture" or "--reproduce" flag,
          # wire it here. Until then this step is a placeholder.

      - name: Verify ${{ matrix.artifact_type }}
        id: verify
        continue-on-error: true
        run: |
          echo "Verifying ${{ matrix.artifact_type }} (advisory)..."
          # Placeholder until handlers expose a non-LLM reproduction mode.
          # Contract when live:
          #   bash .claude/skills/verify-artifact/run.sh \
          #       --type ${{ matrix.artifact_type }} \
          #       --vault golden-corpus \
          #       --json > verify-report.json

      - name: Upload ${{ matrix.artifact_type }} artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-corpus-${{ matrix.artifact_type }}
          path: |
            out/
            verify-report.json
          if-no-files-found: ignore

  drift-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Source-hash smoke test
        # Independent of handler matrix — proves the foundation hasn't drifted.
        run: bash .claude/skills/generate/lib/tests/test-source-hash.sh

  summarise:
    needs: [generate-and-verify, drift-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          {
            echo "## Golden Corpus Results"
            echo ""
            echo "Advisory mode — failures do not block the pipeline."
            echo "See close-the-loop-testing.md non-goals for the rollout plan."
            echo ""
            echo "Per-artifact outputs and verify-reports are uploaded as CI artifacts."
          } >> "$GITHUB_STEP_SUMMARY"
