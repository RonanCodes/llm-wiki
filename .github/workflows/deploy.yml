name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            sites/landing/pnpm-lock.yaml
            sites/docs/pnpm-lock.yaml

      - name: Install root deps
        run: pnpm install

      - name: Install landing site deps
        run: pnpm --dir sites/landing install

      - name: Install docs site deps
        run: pnpm --dir sites/docs install

      - name: Build landing site
        run: pnpm run build:site

      - name: Build docs site
        run: pnpm run build:docs

      - name: Add .nojekyll
        run: touch docs/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
