<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>{{title}}</title>
  <style>
    :root {
      --amber: #e0af40;
      --cyan:  #5bbcd6;
      --green: #7dcea0;
      --bg:    #0b0f14;
      --bg2:   #111922;
      --card:  #1a2230;
      --text:  #e8eef6;
      --muted: #8090a5;
      --wrong: #ff7a7a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, var(--bg), var(--bg2));
      color: var(--text);
      font: 16px/1.5 system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 3rem 1rem;
    }
    .wrap { max-width: 780px; margin: 0 auto; }
    header { border-bottom: 1px solid #22304a; padding-bottom: 1.2rem; margin-bottom: 2rem; }
    h1 { color: var(--amber); margin: 0; font-size: 1.8rem; }
    .sub { color: var(--muted); font-size: 0.95rem; margin-top: .3rem; }
    .q {
      background: var(--card);
      border-radius: 12px;
      padding: 1.4rem 1.4rem 1.2rem;
      margin-bottom: 1rem;
      border-left: 4px solid var(--cyan);
    }
    .q .prompt { font-weight: 600; margin-bottom: 1rem; }
    .opts { display: flex; flex-direction: column; gap: .5rem; margin: 0; padding: 0; list-style: none; }
    .opts button {
      background: #0f1520; color: var(--text);
      border: 1px solid #22304a; border-radius: 8px;
      padding: .65rem .9rem; text-align: left; cursor: pointer;
      font: inherit;
    }
    .opts button:hover { border-color: var(--cyan); }
    .opts button.correct { border-color: var(--green); background: rgba(125,206,160,0.1); }
    .opts button.wrong   { border-color: var(--wrong); background: rgba(255,122,122,0.1); }
    .short input {
      width: 100%; background: #0f1520; color: var(--text);
      border: 1px solid #22304a; border-radius: 8px;
      padding: .65rem .9rem; font: inherit;
    }
    .short button {
      margin-top: .5rem; background: var(--cyan); color: var(--bg);
      border: 0; border-radius: 8px; padding: .5rem 1rem;
      font-weight: 600; cursor: pointer;
    }
    .explain {
      margin-top: .9rem; padding: .8rem 1rem;
      background: rgba(224,175,64,0.08); border-left: 3px solid var(--amber);
      border-radius: 6px; color: var(--text);
      display: none;
    }
    .explain.shown { display: block; }
    .explain a { color: var(--amber); }
    .score {
      margin-top: 2rem; padding: 1.2rem; background: var(--card);
      border-radius: 12px; text-align: center;
      border-top: 4px solid var(--green);
    }
    .score .big { font-size: 2.4rem; font-weight: 700; color: var(--green); }
    footer { color: var(--muted); margin-top: 2rem; text-align: center; font-size: .85rem; }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>{{title}}</h1>
    <div class="sub" id="sub"></div>
  </header>
  <div id="quiz"></div>
  <div class="score" id="score" hidden>
    <div>Score</div>
    <div class="big"><span id="got">0</span> / <span id="total">0</span></div>
  </div>
  <footer>Generated by <code>/generate quiz</code> — click a question's "Source" link to read the wiki page.</footer>
</div>

<script id="quiz-data" type="application/json">
<!-- QUIZ_DATA_HERE -->
</script>

<script>
  const data = JSON.parse(document.getElementById('quiz-data').textContent);
  document.getElementById('sub').textContent =
    `${data.questions.length} questions · difficulty ${data.difficulty} · generated ${data.generated_at}`;

  const root = document.getElementById('quiz');
  let correctCount = 0, answered = 0;

  data.questions.forEach((q, i) => {
    const card = document.createElement('section');
    card.className = 'q';
    const prompt = document.createElement('div');
    prompt.className = 'prompt';
    prompt.textContent = `${i + 1}. ${q.prompt}`;
    card.appendChild(prompt);

    const explain = document.createElement('div');
    explain.className = 'explain';
    const src = q.source ? ` &middot; <a href="../../${q.source}">Source</a>` : '';
    explain.innerHTML = `<strong>Why:</strong> ${q.explanation}${src}`;

    if (q.type === 'mcq') {
      const ul = document.createElement('ul');
      ul.className = 'opts';
      q.options.forEach((opt, idx) => {
        const li = document.createElement('li');
        const btn = document.createElement('button');
        btn.textContent = opt;
        btn.addEventListener('click', () => {
          if (btn.disabled) return;
          [...ul.querySelectorAll('button')].forEach(b => b.disabled = true);
          if (idx === q.correct) { btn.classList.add('correct'); correctCount++; }
          else {
            btn.classList.add('wrong');
            ul.children[q.correct].querySelector('button').classList.add('correct');
          }
          explain.classList.add('shown');
          answered++;
          maybeShowScore();
        });
        li.appendChild(btn);
        ul.appendChild(li);
      });
      card.appendChild(ul);
    } else {
      const wrap = document.createElement('div');
      wrap.className = 'short';
      const input = document.createElement('input');
      input.placeholder = 'Type a short answer…';
      const check = document.createElement('button');
      check.textContent = 'Check';
      check.addEventListener('click', () => {
        if (check.disabled) return;
        const ans = input.value.toLowerCase();
        const hit = (q.correct_keywords || []).some(k => ans.includes(k.toLowerCase()));
        if (hit) correctCount++;
        explain.classList.add('shown');
        check.disabled = true; input.disabled = true;
        answered++;
        maybeShowScore();
      });
      wrap.appendChild(input);
      wrap.appendChild(check);
      card.appendChild(wrap);
    }

    card.appendChild(explain);
    root.appendChild(card);
  });

  function maybeShowScore() {
    if (answered === data.questions.length) {
      document.getElementById('total').textContent = data.questions.length;
      document.getElementById('got').textContent = correctCount;
      document.getElementById('score').hidden = false;
    }
  }
</script>
</body>
</html>
